name: ponit_of_sales
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.2

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  equatable: ^2.0.7
  flutter_bloc: ^9.1.1
  flutter_secure_storage: ^9.2.4
  dio: ^5.9.0
  go_router: ^16.3.0
  intl: ^0.20.2
  provider: ^6.1.5+1
  pdf: ^3.11.3
  path_provider: ^2.1.5
  printing: ^5.14.2
  flutter_thermal_printer: ^1.2.4
  open_file: ^3.5.10
  file_picker: ^10.3.3
  bloc_concurrency: ^0.3.0
  permission_handler: ^12.0.1
  image: ^4.5.4
  esc_pos_utils_plus: ^2.0.4
  ai_barcode_scanner: ^7.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/roboto.ttf
    - family: Noto Sans Symbols
      fonts:
        - asset: assets/fonts/notosanssymbols.ttf
    - family:  Noto Sans Arabic
      fonts:
       - asset: assets/fonts/notosansarabic.ttf
    - family: Noto Color Emoji
      fonts: 
       - asset: assets/fonts/notocoloremoji.ttf
    - family: Noto Sans Symbols 2 3
      fonts: 
       - asset: assets/fonts/notosanssymbols2.ttf
  assets:
    - assets/logo/
    - assets/fonts/
