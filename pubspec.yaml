name: point_of_sales
description: "Point of Sales"
publish_to: 'osama.pro'
version: 1.0.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  equatable: ^2.0.7
  flutter_bloc: ^9.1.1
  flutter_secure_storage: ^9.2.4
  dio: ^5.9.0
  go_router: ^16.3.0
  intl: ^0.20.2
  provider: ^6.1.5+1
  pdf: ^3.11.3
  printing: ^5.14.2
  flutter_thermal_printer: ^1.2.4
  file_picker: ^10.3.3
  bloc_concurrency: ^0.3.0
  permission_handler: ^12.0.1
  image: ^4.5.4
  ai_barcode_scanner: ^7.1.0
  url_launcher: ^6.3.2
  flutter_gen: ^5.12.0
  shared_preferences: ^2.5.4
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/roboto.ttf
    - family: Noto Sans Symbols
      fonts:
        - asset: assets/fonts/notosanssymbols.ttf
    - family:  Noto Sans Arabic
      fonts:
       - asset: assets/fonts/notosansarabic.ttf
    - family: Noto Color Emoji
      fonts: 
       - asset: assets/fonts/notocoloremoji.ttf
    - family: Noto Sans Symbols 2 3
      fonts: 
       - asset: assets/fonts/notosanssymbols2.ttf
  assets:
    - assets/logo/
    - assets/fonts/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  windows: true
  remove_alpha_ios: true
  image_path: "assets/logo/logo-no-background.png" # Update with your image path
  # Optional: for adaptive icons in Android
  # adaptive_icon_foreground: "assets/images/ic_foreground.png"
  # adaptive_icon_background: "#FFFFFF"
