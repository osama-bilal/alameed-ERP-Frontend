name: ponit_of_sales
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  equatable: ^2.0.7
  flutter_bloc: ^9.1.1
  flutter_secure_storage: ^9.2.4
  dio: ^5.9.0
  go_router: ^16.2.4
  intl: ^0.20.2
  provider: ^6.1.5+1
  pdf: ^3.11.3
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/roboto.woff2
    - family: Noto Sans Symbols
      fonts:
        - asset: assets/fonts/notosanssymbols.woff2
    - family:  Noto Sans Arabic
      fonts:
       - asset: assets/fonts/notosansarabic.woff2
    - family: Noto Color Emoji
      fonts: 
       - asset: assets/fonts/notocoloremoji.woff2
    - family: Noto Sans Symbols 2 3
      fonts: 
       - asset: assets/fonts/notosanssymbols2.woff2
  assets:
    - assets/logo/
